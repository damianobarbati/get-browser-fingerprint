<!doctype html>
<html lang="en">
  <head>
    <title>get-browser-fingerprint demo</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 text-gray-900 min-h-screen p-8">
    <div id="overlay" class="fixed inset-0 bg-white/90 flex items-center justify-center z-50 transition-opacity duration-300">
      <div class="w-10 h-10 border-4 border-gray-300 border-t-blue-600 rounded-full animate-spin"></div>
    </div>

    <h1 class="text-2xl font-medium">Fingerprint: <span id="fingerprint" class="font-mono text-blue-700 break-all"></span></h1>
    <div id="timing" class="mt-2 mb-4 text-gray-500 text-sm"></div>
    <pre id="debug" class="bg-white p-5 rounded-lg border border-gray-200 text-sm font-mono overflow-x-auto whitespace-pre-wrap leading-relaxed mb-2"></pre>

    <script type="module">
    import getFingerprint from './index.js';

    const t0 = performance.now();
    const result = await getFingerprint({ debug: true });
    const t1 = performance.now();

    document.getElementById('fingerprint').textContent = result.fingerprint;
    document.getElementById('timing').textContent = `(in ${(t1 - t0).toFixed(0)} ms)`;
    document.getElementById('debug').textContent = JSON.stringify(result, null, 2);

    const overlay = document.getElementById('overlay');
    overlay.style.opacity = '0';
    setTimeout(() => overlay.remove(), 300);
    </script>
  </body>
</html>
